services:
  mediawiki:
    build: .
    image: mwbot-ts-mediawiki:1.45.3
    restart: always
    ports:
      - '8080:80'
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - /var/www/html/images
      # Mount LocalSettings.php outside the web root so install.php does not terminate
      # when it detects an existing LocalSettings.php. Later in setup.sh, the mounted
      # configuration file is copied into the web root.
      - ./LocalSettings.php:/var/www/html/conf/LocalSettings.php
      - ./setup-testdata.sh:/tmp/setup-testdata.sh

  database:
    image: mariadb:12.3.2
    restart: always
    environment:
      MYSQL_DATABASE: mwbot_ts
      MYSQL_USER: mwbot_ts
      MYSQL_PASSWORD: mwbot_ts
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
    ports:
      - '3312:3306'
    healthcheck:
      test: [
        "CMD",
        "mariadb",
        "-u",
        "mwbot_ts",
        "-pmwbot_ts",
        "-e",
        "SELECT 1",
        "mwbot_ts"
      ]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 10