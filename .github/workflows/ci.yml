name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-localwiki:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
        auth-method: [oauth2, oauth1, botpassword, anonymous]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Setup local MediaWiki for ${{ matrix.auth-method }} authentication
        run: npm run test:setup -- ${{ matrix.auth-method }}
      - name: Run localwiki integration tests
        run: npm run test:localwiki

  integration-testwiki:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: testwiki
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run testwiki integration tests
        run: npm run test:testwiki
        env:
          OAUTH2_ACCESS_TOKEN: ${{ secrets.OAUTH2_ACCESS_TOKEN }}
          OAUTH1A_CONSUMER_TOKEN: ${{ secrets.OAUTH1A_CONSUMER_TOKEN }}
          OAUTH1A_CONSUMER_SECRET: ${{ secrets.OAUTH1A_CONSUMER_SECRET }}
          OAUTH1A_ACCESS_TOKEN: ${{ secrets.OAUTH1A_ACCESS_TOKEN }}
          OAUTH1A_ACCESS_SECRET: ${{ secrets.OAUTH1A_ACCESS_SECRET }}